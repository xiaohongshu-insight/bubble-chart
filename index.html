<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书各行业声量图谱 2026</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #fff; color: #222; }
.header { padding: 32px 48px 16px; border-bottom: 1px solid #f0f0f0; }
.header h1 { font-size: 26px; font-weight: 700; color: #111; }
.header .sub { font-size: 13px; color: #999; margin-top: 6px; }
.legend { display: flex; gap: 24px; padding: 14px 48px; font-size: 12px; color: #888; background: #fafafa; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.chart-wrap { position: relative; padding: 32px 48px 48px; }
svg { width: 100%; height: 620px; }
.tooltip {
  position: absolute; background: #fff; border: 1px solid #e8e8e8;
  border-radius: 10px; padding: 14px 18px; font-size: 13px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); pointer-events: none;
  display: none; z-index: 100; min-width: 200px;
}
.tooltip h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.tooltip .row { display: flex; justify-content: space-between; margin: 4px 0; }
.tooltip .label { color: #888; }
.tooltip .val { font-weight: 600; }
.yoy-pos { color: #00B96B; }
.yoy-neg { color: #ff4d4f; }
.source { padding: 0 48px 24px; font-size: 11px; color: #ccc; }
</style>
</head>
<body>
<div class="header">
  <h1>小红书各行业声量图谱</h1>
  <div class="sub">横轴：内容阅读量规模 &nbsp;|&nbsp; 纵轴：搜索量 &nbsp;|&nbsp; 泡泡大小：搜索体量 &nbsp;|&nbsp; 数据时间：2026.1-5 vs 2025.1-5</div>
</div>
<div class="legend">
  <span>泡泡越大 = 搜索量越高</span>
  <span class="legend-item"><span style="color:#00B96B;font-weight:700">↑ 绿色数字</span>&nbsp;同比增长</span>
  <span class="legend-item"><span style="color:#ff4d4f;font-weight:700">↓ 红色数字</span>&nbsp;同比下降</span>
  <span style="margin-left:auto;color:#bbb">Hover 泡泡查看详情</span>
</div>
<div class="chart-wrap">
  <svg id="chart" viewBox="0 0 1000 580"></svg>
  <div class="tooltip" id="tip"></div>
</div>
<div class="source">数据来源：小红书 RedBI &nbsp;·&nbsp; dataset 12041「全量搜索词互动数据每日增量表」&nbsp;·&nbsp; 2026年1-5月（5月截至月中）</div>

<script>
const industries = [
  { name:'数码3C',   x:0.82, y:0.88, search26:2393.7, search25:2398.9, read:'极高', color:'#4A90D9', desc:'手机/耳机/平板等数码品类' },
  { name:'美妆个护', x:0.67, y:0.72, search26:609.4,  search25:702.8,  read:'高',   color:'#E8739A', desc:'口红/粉底/护肤等美妆品类' },
  { name:'运动健身', x:0.40, y:0.76, search26:844.9,  search25:930.6,  read:'中高', color:'#52C41A', desc:'健身/瑜伽/跑步/减肥' },
  { name:'餐饮美食', x:0.53, y:0.71, search26:574.1,  search25:449.5,  read:'高',   color:'#FF9A3C', desc:'美食探店/餐厅推荐' },
  { name:'教育学习', x:0.28, y:0.69, search26:525.2,  search25:547.0,  read:'中',   color:'#9C59B6', desc:'考研/英语/留学/雅思' },
  { name:'出境游',   x:0.22, y:0.38, search26:43.1,   search25:4.0,    read:'中低', color:'#00C2A0', desc:'出境游/出国旅游/出境旅行' },
  { name:'跨境租车', x:0.16, y:0.43, search26:69.1,   search25:61.7,   read:'低',   color:'#FF6B00', desc:'海外租车/自驾出行' },
  { name:'跨境支付', x:0.08, y:0.18, search26:2.3,    search25:0.8,    read:'低',   color:'#1677FF', desc:'跨境支付/外贸收款工具' },
];

const svg = document.getElementById('chart');
const W = 1000, H = 580;
const PAD = { l: 70, r: 60, t: 40, b: 60 };
const cW = W - PAD.l - PAD.r;
const cH = H - PAD.t - PAD.b;

// 最大搜索量用于泡泡大小
const maxS = Math.max(...industries.map(d => d.search26));
function radius(v) {
  return 14 + Math.pow(v / maxS, 0.45) * 82;
}

function yow(d) {
  return ((d.search26 - d.search25) / d.search25 * 100);
}

// 画网格线
const yTicks = [1, 5, 10, 50, 100, 500, 1000, 3000];
function yScale(v) {
  // log scale 1~3000M
  return PAD.t + cH - (Math.log10(v) / Math.log10(3000)) * cH;
}
function xScale(v) { return PAD.l + v * cW; }

// grid
yTicks.forEach(v => {
  const y = yScale(v);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', PAD.l); line.setAttribute('x2', W - PAD.r);
  line.setAttribute('y1', y); line.setAttribute('y2', y);
  line.setAttribute('stroke', '#f0f0f0'); line.setAttribute('stroke-width', '1');
  svg.appendChild(line);
  const t = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x', PAD.l - 8); t.setAttribute('y', y + 4);
  t.setAttribute('text-anchor','end'); t.setAttribute('font-size','11');
  t.setAttribute('fill','#bbb');
  t.textContent = v >= 1000 ? (v/1000)+'K M' : v+'M';
  svg.appendChild(t);
});

// 轴标签
const xLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
xLabel.setAttribute('x', W/2); xLabel.setAttribute('y', H - 10);
xLabel.setAttribute('text-anchor','middle'); xLabel.setAttribute('font-size','12');
xLabel.setAttribute('fill','#aaa');
xLabel.textContent = '← 内容阅读量规模（由小到大）→';
svg.appendChild(xLabel);

const yLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
yLabel.setAttribute('transform', `rotate(-90)`);
yLabel.setAttribute('x', -(H/2)); yLabel.setAttribute('y', 16);
yLabel.setAttribute('text-anchor','middle'); yLabel.setAttribute('font-size','12');
yLabel.setAttribute('fill','#aaa');
yLabel.textContent = '搜索量（2026年1-5月）';
svg.appendChild(yLabel);

// 标注偏移配置
const labelOffsets = {
  '数码3C':   { dx: 0,   dy: -1 },
  '美妆个护': { dx: 1.0, dy: -0.5 },
  '运动健身': { dx: -1.0,dy: -0.5 },
  '餐饮美食': { dx: 0,   dy: 1 },
  '教育学习': { dx: -1.0,dy: 0.3 },
  '出境游':   { dx: 0.8, dy: -0.6 },
  '跨境租车': { dx: -0.8,dy: -0.7 },
  '跨境支付': { dx: 0.6, dy: -0.8 },
};

const tip = document.getElementById('tip');

industries.forEach(d => {
  const cx = xScale(d.x);
  const cy = yScale(d.search26);
  const r = radius(d.search26);
  const yoyVal = yow(d);
  const sign = yoyVal >= 0 ? '+' : '';
  const yoyColor = yoyVal >= 0 ? '#00B96B' : '#ff4d4f';
  const off = labelOffsets[d.name] || { dx: 0, dy: -1 };
  const lx = cx + off.dx * (r + 28);
  const ly = cy + off.dy * (r + 18);

  // 连接线
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', cx); line.setAttribute('y1', cy);
  line.setAttribute('x2', lx); line.setAttribute('y2', ly);
  line.setAttribute('stroke', '#ddd'); line.setAttribute('stroke-width', '1');
  line.setAttribute('stroke-dasharray', '3,2');
  svg.appendChild(line);

  // 泡泡
  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', r);
  circle.setAttribute('fill', d.color); circle.setAttribute('opacity', '0.82');
  circle.setAttribute('stroke', '#fff'); circle.setAttribute('stroke-width', '2');
  circle.style.cursor = 'pointer';
  circle.style.transition = 'opacity 0.2s, r 0.2s';
  circle.addEventListener('mouseenter', (e) => {
    circle.setAttribute('opacity','1');
    tip.style.display = 'block';
    tip.innerHTML = `
      <h3 style="color:${d.color}">${d.name}</h3>
      <div class="row"><span class="label">行业说明</span><span class="val">${d.desc}</span></div>
      <div class="row"><span class="label">搜索量 2026.1-5</span><span class="val">${d.search26.toFixed(1)}M 次</span></div>
      <div class="row"><span class="label">搜索量 2025.1-5</span><span class="val">${d.search25.toFixed(1)}M 次</span></div>
      <div class="row"><span class="label">同比变化</span><span class="val ${yoyVal>=0?'yoy-pos':'yoy-neg'}">${sign}${yoyVal.toFixed(1)}%</span></div>
      <div class="row"><span class="label">内容阅读规模</span><span class="val">${d.read}</span></div>
    `;
  });
  circle.addEventListener('mousemove', (e) => {
    const wrap = document.querySelector('.chart-wrap').getBoundingClientRect();
    tip.style.left = (e.clientX - wrap.left + 16) + 'px';
    tip.style.top = (e.clientY - wrap.top - 20) + 'px';
  });
  circle.addEventListener('mouseleave', () => {
    circle.setAttribute('opacity','0.82');
    tip.style.display = 'none';
  });
  svg.appendChild(circle);

  // 行业名
  const nameT = document.createElementNS('http://www.w3.org/2000/svg','text');
  nameT.setAttribute('x', lx); nameT.setAttribute('y', ly - 6);
  nameT.setAttribute('text-anchor','middle'); nameT.setAttribute('font-size','13');
  nameT.setAttribute('font-weight','700'); nameT.setAttribute('fill','#222');
  nameT.textContent = d.name;
  svg.appendChild(nameT);

  // 环比
  const yoyT = document.createElementNS('http://www.w3.org/2000/svg','text');
  yoyT.setAttribute('x', lx); yoyT.setAttribute('y', ly + 12);
  yoyT.setAttribute('text-anchor','middle'); yoyT.setAttribute('font-size','12');
  yoyT.setAttribute('font-weight','700'); yoyT.setAttribute('fill', yoyColor);
  yoyT.textContent = `${sign}${yoyVal.toFixed(0)}%`;
  svg.appendChild(yoyT);
});

// 右下角水印
const logo = document.createElementNS('http://www.w3.org/2000/svg','text');
logo.setAttribute('x', W - 16); logo.setAttribute('y', H - 8);
logo.setAttribute('text-anchor','end'); logo.setAttribute('font-size','11');
logo.setAttribute('fill','#ddd');
logo.textContent = '小红书 RedBI · 2026';
svg.appendChild(logo);
</script>
</body>
</html>
